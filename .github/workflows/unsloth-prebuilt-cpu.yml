name: "Unsloth whisper prebuilt: CPU"

# Reusable child of unsloth-prebuilt.yml. Builds the P0 CPU whisper-server
# bundles: Linux x64, Linux arm64, Windows x64/arm64. (The macOS x64 CPU slice
# is built by the macOS child so it shares the deployment-target logic.)
#
# Portability model, per arch (mirrors upstream ggml-org/whisper.cpp and
# unslothai/llama.cpp CPU builds):
#   x86-64 (Linux x64, Windows x64): DYNAMIC -- GGML_BACKEND_DL +
#     GGML_CPU_ALL_VARIANTS build every CPU microarch as a loadable ggml backend
#     module (ggml-cpu-sse42/sandybridge/haswell/skylakex/icelake ...); ggml
#     probes the host at server startup and dispatches to the best variant it
#     supports (SSE4.2 .. AVX-512). This is why the bundle ships co-located libs
#     rather than one file: GGML_NATIVE=OFF alone does NOT lower the ISA floor
#     (it only drops -march=native), so a single static x86 build would bake in
#     an AVX2/Haswell-2013 floor and SIGILL on older CPUs. The co-located libs
#     resolve through the binary's $ORIGIN rpath (exe-dir search on Windows).
#   arm64 (Linux arm64): STATIC single-file -- ARM has no x86-style variant set,
#     so pin the broad armv8-a baseline (GGML_CPU_ARM_ARCH=armv8-a) and ship one
#     self-contained binary.
# Only the whisper-server target is built (examples on so the server compiles,
# tests off).

on:
  workflow_call:
    inputs:
      tag:            { required: true,  type: string }
      upstream_tag:   { required: true,  type: string }
      repo:           { required: false, type: string, default: 'unslothai/whisper.cpp' }
      commit:         { required: true,  type: string }
      source_artifact: { required: true,  type: string }

permissions:
  contents: read

env:
  # Tiny English model + the repo's own JFK sample drive the CI transcription.
  WHISPER_MODEL_URL: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin"

jobs:
  build-linux:
    name: linux/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86-64: dynamic, runtime microarch dispatch (see header).
          - { arch: x64,   runner: ubuntu-22.04,     shared: "ON",  cpu_defines: "-DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON", static: "false" }
          # arm64: static single-file at the broad armv8-a baseline (see header).
          - { arch: arm64, runner: ubuntu-22.04-arm, shared: "OFF", cpu_defines: "-DGGML_CPU_ARM_ARCH=armv8-a",                     static: "true"  }
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v6
        with: { path: tooling, persist-credentials: false }

      - name: Download stamped source @ ${{ inputs.tag }}
        uses: actions/download-artifact@v6
        with: { name: "${{ inputs.source_artifact }}", path: srcpkg }
      - name: Extract source
        run: |
          set -eux
          mkdir -p src
          tar -xzf "srcpkg/whisper.cpp-source-${{ inputs.tag }}.tar.gz" -C src --strip-components=1

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build

      # arm64 on ubuntu-22.04-arm keeps the glibc 2.35 floor; jammy gcc can't
      # target armv9 SME, so use clang (links the system libstdc++).
      - name: Toolchain (clang 19 on arm64)
        if: matrix.arch == 'arm64'
        run: |
          set -eux
          wget -q https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 19
          { echo "CC=clang-19"; echo "CXX=clang++-19"; } >> "$GITHUB_ENV"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with: { key: "cpu-linux-${{ matrix.arch }}", variant: ccache, evict-old-files: 14d }

      - name: Configure + build
        working-directory: src
        run: |
          set -eux
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=${{ matrix.shared }} \
            -DGGML_NATIVE=OFF ${{ matrix.cpu_defines }} \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_SERVER=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_SDL2=OFF \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --config Release --target whisper-server -j "$(nproc)"
          strip build/bin/whisper-server || true

      - name: Package bundle
        env:
          OS: linux
          ARCH: ${{ matrix.arch }}
          ACCEL: cpu
          BACKEND: cpu
          STATIC: ${{ matrix.static }}
          MIN_OS: "glibc-2.35"
          BIN_DIR: ${{ github.workspace }}/src/build/bin
          SRC_DIR: ${{ github.workspace }}/src
          OUT_DIR: ${{ github.workspace }}/dist
          TAG: ${{ inputs.tag }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          SOURCE_COMMIT: ${{ inputs.commit }}
          SOURCE_REPO: ${{ inputs.repo }}
        run: python3 tooling/scripts/package_bundle.py

      # Native runners (x64 + arm64 are both native here), so validate for real.
      - name: Validate bundle (help + closure + transcription + --no-gpu)
        run: |
          set -eux
          mkdir -p bundle model
          tar -xzf "dist/whisper-${{ inputs.tag }}-linux-${{ matrix.arch }}-cpu.tar.gz" -C bundle
          curl -fsSL "$WHISPER_MODEL_URL" -o model/ggml-tiny.en.bin
          python3 tooling/scripts/validate_bundle.py \
            --bundle bundle --model model/ggml-tiny.en.bin --audio src/samples/jfk.wav

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: whisper-${{ inputs.tag }}-linux-${{ matrix.arch }}-cpu
          path: dist/whisper-${{ inputs.tag }}-linux-${{ matrix.arch }}-cpu.tar.gz
          if-no-files-found: error

  build-windows:
    name: windows/${{ matrix.arch }}
    # x64 builds native with MSVC. arm64 is cross-compiled on the same x64 runner:
    # the MSVC amd64_arm64 env supplies the Windows arm64 SDK/libs, but the
    # COMPILER is clang via whisper's own cmake/arm64-windows-llvm.cmake toolchain
    # file (exactly how unslothai/llama.cpp builds windows-cpu arm64) -- MSVC's
    # cl.exe cannot link ggml's aarch64 repack/GEMM kernels, clang can. arm64
    # cannot run/validate on the x64 runner, so only x64 gets the transcription
    # smoke test. arm64 stays best-effort (continue-on-error), never
    # release-blocking.
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86-64: dynamic, runtime microarch dispatch (see header).
          - { arch: x64,   msvc_arch: amd64,       optional: false, shared: "ON",  cpu_defines: "-DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON", static: "false" }
          # arm64: cross-compiled with clang via the arm64-windows-llvm toolchain
          # (MSVC cannot link ggml's aarch64 repack kernels); OpenMP off keeps the
          # static binary self-contained. Its cmake flags live in the dedicated
          # "Configure + build (arm64, cmd)" step below (they must be passed in cmd,
          # not pwsh -- see that step), so cpu_defines is unused here. Best-effort,
          # single static binary.
          - { arch: arm64, msvc_arch: amd64_arm64, optional: true,  shared: "OFF", cpu_defines: "", static: "true"  }
    continue-on-error: ${{ matrix.optional }}
    defaults:
      run: { shell: pwsh }
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v6
        with: { path: tooling, persist-credentials: false }

      - name: Download stamped source @ ${{ inputs.tag }}
        uses: actions/download-artifact@v6
        with: { name: "${{ inputs.source_artifact }}", path: srcpkg }
      - name: Extract source
        shell: bash
        run: |
          set -eux
          mkdir -p src
          tar -xzf "srcpkg/whisper.cpp-source-${{ inputs.tag }}.tar.gz" -C src --strip-components=1

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with: { key: "cpu-windows-${{ matrix.arch }}", variant: ccache, evict-old-files: 14d }

      - name: Install Ninja
        run: choco install ninja --no-progress

      # amd64 for x64; amd64_arm64 cross-compiles arm64 from the x64 host.
      - name: Setup MSVC (${{ matrix.msvc_arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with: { arch: "${{ matrix.msvc_arch }}" }

      # x64: native MSVC build in pwsh (the ilammy step above set the amd64 env).
      - name: Configure + build (x64)
        if: matrix.arch == 'x64'
        working-directory: src
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=${{ matrix.shared }} `
            -DGGML_NATIVE=OFF ${{ matrix.cpu_defines }} `
            -DWHISPER_BUILD_EXAMPLES=ON `
            -DWHISPER_BUILD_SERVER=ON `
            -DWHISPER_BUILD_TESTS=OFF `
            -DWHISPER_SDL2=OFF `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --config Release --target whisper-server

      # arm64: cross-compile with clang via the arm64-windows-llvm toolchain file.
      # This MUST run in cmd, not pwsh: PowerShell word-splits the unquoted
      # -DCMAKE_TOOLCHAIN_FILE=cmake/arm64-windows-llvm.cmake argument at the
      # final dot (passing cmake/arm64-windows-llvm + a stray .cmake), so CMake
      # cannot find the toolchain file. cmd passes it as one token. This mirrors
      # unslothai/llama.cpp's windows CPU build, which runs its configure in cmd
      # for the same reason. The ilammy amd64_arm64 env (PATH/LIB/INCLUDE) set
      # above is inherited here via GITHUB_ENV/GITHUB_PATH.
      - name: Configure + build (arm64, cmd)
        if: matrix.arch == 'arm64'
        working-directory: src
        shell: cmd
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED_LIBS=${{ matrix.shared }} ^
            -DGGML_NATIVE=OFF ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/arm64-windows-llvm.cmake ^
            -DGGML_OPENMP=OFF ^
            -DWHISPER_BUILD_EXAMPLES=ON ^
            -DWHISPER_BUILD_SERVER=ON ^
            -DWHISPER_BUILD_TESTS=OFF ^
            -DWHISPER_SDL2=OFF ^
            -DCMAKE_C_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          if errorlevel 1 exit /b 1
          cmake --build build --config Release --target whisper-server
          if errorlevel 1 exit /b 1

      - name: Package bundle
        env:
          OS: windows
          ARCH: ${{ matrix.arch }}
          ACCEL: cpu
          BACKEND: cpu
          STATIC: ${{ matrix.static }}
          MIN_OS: "windows-10"
          BIN_DIR: ${{ github.workspace }}/src/build/bin
          SRC_DIR: ${{ github.workspace }}/src
          OUT_DIR: ${{ github.workspace }}/dist
          TAG: ${{ inputs.tag }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          SOURCE_COMMIT: ${{ inputs.commit }}
          SOURCE_REPO: ${{ inputs.repo }}
        run: python tooling/scripts/package_bundle.py

      # arm64 is cross-compiled and cannot execute on the x64 runner; validate
      # the native x64 bundle only. The arm64 zip still ships (packaged above).
      - name: Validate bundle (help + transcription + --no-gpu)
        if: matrix.arch == 'x64'
        shell: bash
        run: |
          set -eux
          mkdir -p bundle model
          (cd bundle && 7z x -y "../dist/whisper-${{ inputs.tag }}-windows-${{ matrix.arch }}-cpu.zip" >/dev/null)
          curl -fsSL "$WHISPER_MODEL_URL" -o model/ggml-tiny.en.bin
          python tooling/scripts/validate_bundle.py \
            --bundle bundle --model model/ggml-tiny.en.bin --audio src/samples/jfk.wav

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: whisper-${{ inputs.tag }}-windows-${{ matrix.arch }}-cpu
          path: dist/whisper-${{ inputs.tag }}-windows-${{ matrix.arch }}-cpu.zip
          if-no-files-found: error
