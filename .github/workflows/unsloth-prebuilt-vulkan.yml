name: "Unsloth whisper prebuilt: Vulkan"

# Reusable child of unsloth-prebuilt.yml (P1). Vulkan whisper-server bundles for
# Linux x64 + Windows x64. Dynamic build with GGML_BACKEND_DL so the Vulkan
# backend is a dlopen'd libggml-vulkan module and the binary still runs on CPU
# with --no-gpu. The Vulkan loader (libvulkan.so.1 / vulkan-1.dll) is a
# system/driver library resolved by the OS at runtime, so it is NOT bundled;
# only ggml's own libggml-vulkan module ships.

on:
  workflow_call:
    inputs:
      tag:            { required: true,  type: string }
      upstream_tag:   { required: true,  type: string }
      repo:           { required: false, type: string, default: 'unslothai/whisper.cpp' }
      commit:         { required: true,  type: string }
      source_artifact: { required: true,  type: string }

permissions:
  contents: read

env:
  VULKAN_VERSION: 1.4.313.2
  WHISPER_MODEL_URL: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin"

jobs:
  build-linux:
    name: linux/x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v6
        with: { path: tooling, persist-credentials: false }

      - name: Download stamped source @ ${{ inputs.tag }}
        uses: actions/download-artifact@v6
        with: { name: "${{ inputs.source_artifact }}", path: srcpkg }
      - name: Extract source
        run: |
          set -eux
          mkdir -p src
          tar -xzf "srcpkg/whisper.cpp-source-${{ inputs.tag }}.tar.gz" -C src --strip-components=1

      - name: Install Vulkan SDK + build dependencies
        run: |
          set -eux
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y build-essential mesa-vulkan-drivers vulkan-sdk ninja-build

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with: { key: vulkan-linux-x64, variant: ccache, evict-old-files: 14d }

      - name: Configure + build (dynamic, backend-DL, CPU fallback)
        working-directory: src
        run: |
          set -eux
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_BACKEND_DL=ON \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_VULKAN=ON \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DWHISPER_BUILD_SERVER=ON \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_SDL2=OFF \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_INSTALL_RPATH_USE_LINK_PATH=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --config Release --target whisper-server -j "$(nproc)"
          strip build/bin/whisper-server || true

      - name: Package bundle
        env:
          OS: linux
          ARCH: x64
          ACCEL: vulkan
          BACKEND: vulkan
          MIN_OS: "glibc-2.35"
          BIN_DIR: ${{ github.workspace }}/src/build/bin
          SRC_DIR: ${{ github.workspace }}/src
          OUT_DIR: ${{ github.workspace }}/dist
          TAG: ${{ inputs.tag }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          SOURCE_COMMIT: ${{ inputs.commit }}
          SOURCE_REPO: ${{ inputs.repo }}
        run: python3 tooling/scripts/package_bundle.py

      # GPU bundles are built and shipped un-run: the Vulkan runner has no GPU,
      # so there is nothing to validate here, matching unslothai/llama.cpp.
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: whisper-${{ inputs.tag }}-linux-x64-vulkan
          path: dist/whisper-${{ inputs.tag }}-linux-x64-vulkan.tar.gz
          if-no-files-found: error

  build-windows:
    name: windows/x64
    runs-on: windows-2022
    defaults:
      run: { shell: pwsh }
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v6
        with: { path: tooling, persist-credentials: false }

      - name: Download stamped source @ ${{ inputs.tag }}
        uses: actions/download-artifact@v6
        with: { name: "${{ inputs.source_artifact }}", path: srcpkg }
      - name: Extract source
        shell: bash
        run: |
          set -eux
          mkdir -p src
          tar -xzf "srcpkg/whisper.cpp-source-${{ inputs.tag }}.tar.gz" -C src --strip-components=1

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with: { key: vulkan-windows-x64, variant: ccache, evict-old-files: 14d }

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Vulkan SDK
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Configure + build (dynamic, backend-DL, CPU fallback)
        working-directory: src
        run: |
          $env:CMAKE_PREFIX_PATH = $env:VULKAN_SDK
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DGGML_NATIVE=OFF `
            -DGGML_BACKEND_DL=ON `
            -DGGML_CPU_ALL_VARIANTS=ON `
            -DGGML_OPENMP=OFF `
            -DGGML_VULKAN=ON `
            -DWHISPER_BUILD_EXAMPLES=ON `
            -DWHISPER_BUILD_SERVER=ON `
            -DWHISPER_BUILD_TESTS=OFF `
            -DWHISPER_SDL2=OFF `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --config Release --target whisper-server -j 3

      - name: Package bundle
        env:
          OS: windows
          ARCH: x64
          ACCEL: vulkan
          BACKEND: vulkan
          MIN_OS: "windows-10"
          BIN_DIR: ${{ github.workspace }}/src/build/bin
          SRC_DIR: ${{ github.workspace }}/src
          OUT_DIR: ${{ github.workspace }}/dist
          TAG: ${{ inputs.tag }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          SOURCE_COMMIT: ${{ inputs.commit }}
          SOURCE_REPO: ${{ inputs.repo }}
        run: python tooling/scripts/package_bundle.py

      # GPU bundles are built and shipped un-run: the Windows Vulkan runner has
      # no GPU, so there is nothing to validate here, matching unslothai/llama.cpp.
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: whisper-${{ inputs.tag }}-windows-x64-vulkan
          path: dist/whisper-${{ inputs.tag }}-windows-x64-vulkan.zip
          if-no-files-found: error
